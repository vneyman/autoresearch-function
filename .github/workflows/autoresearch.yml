name: autoresearch

on:
  workflow_dispatch:
    inputs:
      description:
        description: Short run description
        required: false
        default: github-actions run
      rollback:
        description: Roll back the last commit on discard/crash
        required: false
        default: "false"
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: autoresearch-main
  cancel-in-progress: false

jobs:
  experiment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Run tests
        run: .venv/bin/python -m pytest

      - name: Run experiment
        env:
          RUN_DESCRIPTION: ${{ github.event.inputs.description || 'github-actions scheduled run' }}
          ROLLBACK: ${{ github.event.inputs.rollback || 'false' }}
        run: |
          if [ "$ROLLBACK" = "true" ]; then
            .venv/bin/python scripts/run_experiment.py --description "$RUN_DESCRIPTION" --rollback
          else
            .venv/bin/python scripts/run_experiment.py --description "$RUN_DESCRIPTION"
          fi

      - name: Show status
        run: .venv/bin/python scripts/status.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autoresearch-results
          path: |
            benchmark-summary.json
            .autoresearch/engineering/portfolio-return/results.tsv
            .autoresearch/engineering/portfolio-return/run.log

      - name: Commit experiment outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .autoresearch/engineering/portfolio-return/results.tsv .autoresearch/engineering/portfolio-return/run.log
          if git diff --cached --quiet; then
            echo "No experiment output changes to commit."
            exit 0
          fi
          git commit -m "chore: update autoresearch outputs [skip ci]"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin "HEAD:$GITHUB_REF_NAME"
